    .suite-stat .f { color: #dc2626; font-weight: 700; }

    .subsuite-name {

  const d = new Date();
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
}

/* ─────────────────────────────────────────────
   Mini Test Framework
   ───────────────────────────────────────────── */
const __suiteStack  = [];
const __rootSuites  = [];

function describe(name, fn) {
  const suite = { name, tests: [], suites: [], beforeEach: null };
  if (__suiteStack.length) {
    __suiteStack[__suiteStack.length - 1].suites.push(suite);
  } else {
    __rootSuites.push(suite);
  }
  __suiteStack.push(suite);
  fn();
  __suiteStack.pop();
}

function beforeEach(fn) {
  if (__suiteStack.length) __suiteStack[__suiteStack.length - 1].beforeEach = fn;
}

function test(name, fn) {
  if (__suiteStack.length) __suiteStack[__suiteStack.length - 1].tests.push({ name, fn });
}

/* expect 匹配器 */
function expect(actual) {
  const fail = msg => { throw new Error(msg); };
  const fmt  = v => {
    if (v === null)      return 'null';
    if (v === undefined) return 'undefined';
    if (typeof v === 'string') return `"${v}"`;
    return String(v);
  };
  return {
    toBe(exp)            { if (actual !== exp) fail(`期望 ${fmt(actual)} 嚴格等於 ${fmt(exp)}`); },
    toBeNull()           { if (actual !== null) fail(`期望 ${fmt(actual)} 為 null`); },
    toBeTruthy()         { if (!actual) fail(`期望 ${fmt(actual)} 為 truthy`); },
    toBeFalsy()          { if (actual) fail(`期望 ${fmt(actual)} 為 falsy`); },
    toHaveLength(n)      { if (!actual || actual.length !== n) fail(`期望長度 ${n}，實際 ${actual?.length}`); },
    toContain(item)      {
      if (Array.isArray(actual)) {
        if (!actual.includes(item)) fail(`陣列不包含 ${fmt(item)}`);
      } else if (typeof actual === 'string') {
        if (!actual.includes(item)) fail(`字串 "${actual}" 不包含 "${item}"`);
      } else { fail('toContain 僅支援陣列或字串'); }
    },
    toBeGreaterThan(n)   { if (actual <= n) fail(`期望 ${actual} > ${n}`); },
    toBeGreaterThanOrEqual(n) { if (actual < n) fail(`期望 ${actual} >= ${n}`); },
    toBeCloseTo(exp, precision = 2) {
      const threshold = Math.pow(10, -precision) / 2;
      if (Math.abs(actual - exp) >= threshold)
        fail(`期望 ${actual} 接近 ${exp}（精度 ${precision}）`);
    },
    not: {
      toBe(exp)    { if (actual === exp) fail(`期望 ${fmt(actual)} 不等於 ${fmt(exp)}`); },
      toBeNull()   { if (actual === null) fail(`期望值不為 null`); },
      toBeTruthy() { if (actual) fail(`期望 ${fmt(actual)} 不為 truthy`); },
    }
  };
}

/* 執行器：遞迴執行 suite 並收集結果 */
function __runSuite(suite, inheritedBeforeEach = []) {
  const allBE = [...inheritedBeforeEach];
  if (suite.beforeEach) allBE.push(suite.beforeEach);

  const results = [];

  for (const t of suite.tests) {
    for (const be of allBE) { try { be(); } catch(e) {} }
    const t0 = performance.now();
    let err = null;
    try { t.fn(); } catch(e) { err = e; }
    const ms = (performance.now() - t0).toFixed(1);
    results.push({ name: t.name, pass: !err, err: err ? err.message : null, ms });
  }

  const childResults = [];
  for (const child of suite.suites) {
    childResults.push({ suite: child, results: __runSuite(child, allBE) });
  }

  return { ownResults: results, children: childResults };
}

// ═══ 一、auth.js ═══
describe('auth.js — 帳號驗證與使用者管理', () => {
  beforeEach(() => __resetState());

  describe('isValidEmail()', () => {
    test('標準 Email 格式應回傳 true', () => {
      expect(isValidEmail('test@example.com')).toBe(true);
      expect(isValidEmail('admin@example.com')).toBe(true);
      expect(isValidEmail('user.name+tag@mail.domain.org')).toBe(true);
    });
    test('缺少 @ 符號應回傳 false', () => {
      expect(isValidEmail('notanemail')).toBe(false);
    });
    test('@ 在開頭應回傳 false', () => {
      expect(isValidEmail('@example.com')).toBe(false);
    });
    test('@ 在結尾應回傳 false', () => {
      expect(isValidEmail('user@')).toBe(false);
    });
    test('空字串應回傳 false', () => {
      expect(isValidEmail('')).toBe(false);
    });
    test('含空白字元應回傳 false', () => {
      expect(isValidEmail('user @example.com')).toBe(false);
    });
  });

  describe('isValidPhone()', () => {
    test('有效台灣手機號碼應回傳 true', () => {
      expect(isValidPhone('0912345678')).toBe(true);
      expect(isValidPhone('0987654321')).toBe(true);
    });
    test('非 09 開頭應回傳 false', () => {
      expect(isValidPhone('0812345678')).toBe(false);
      expect(isValidPhone('1912345678')).toBe(false);
    });
    test('位數不足 10 碼應回傳 false', () => {
      expect(isValidPhone('091234567')).toBe(false);
    });
    test('超過 10 碼應回傳 false', () => {
      expect(isValidPhone('09123456789')).toBe(false);
    });
    test('含英文字母應回傳 false', () => {
      expect(isValidPhone('0912abc678')).toBe(false);
    });
    test('空字串應回傳 false', () => {
      expect(isValidPhone('')).toBe(false);
    });
  });

  describe('normalizeAccount()', () => {
    test('轉換為小寫', () => {
      expect(normalizeAccount('ADMIN@EXAMPLE.COM')).toBe('admin@example.com');
    });
    test('去除前後空白', () => {
      expect(normalizeAccount('  user@test.com  ')).toBe('user@test.com');
    });
    test('null / undefined 應回傳空字串', () => {
      expect(normalizeAccount(null)).toBe('');
      expect(normalizeAccount(undefined)).toBe('');
    });
  });

  describe('getAccountType()', () => {
    test('Email 帳號回傳 "email"', () => {
      expect(getAccountType('user@example.com')).toBe('email');
    });
    test('手機號碼回傳 "phone"', () => {
      expect(getAccountType('0912345678')).toBe('phone');
    });
    test('無效格式回傳空字串', () => {
      expect(getAccountType('invalid')).toBe('');
      expect(getAccountType('')).toBe('');
    });
  });

  describe('getRoleName()', () => {
    test('admin → "管理員"', () => {
      expect(getRoleName('admin')).toBe('管理員');
    });
    test('customer → "顧客"', () => {
      expect(getRoleName('customer')).toBe('顧客');
    });
    test('未知角色 → "訪客"', () => {
      expect(getRoleName('unknown')).toBe('訪客');
      expect(getRoleName('')).toBe('訪客');
    });
  });

  describe('getNextUserId()', () => {
    test('只有一位使用者時回傳 2', () => {
      expect(getNextUserId()).toBe(2);
    });
    test('多位使用者時回傳最大 id + 1', () => {
      users.push({ id: 5, account: 'x@x.com', role: 'customer' });
      expect(getNextUserId()).toBe(6);
    });
  });

  describe('isAdmin() / isCustomer()', () => {
    test('未登入時兩者都是 false', () => {
      expect(isAdmin()).toBe(false);
      expect(isCustomer()).toBe(false);
    });
    test('以管理員登入後 isAdmin() 為 true', () => {
      setLoginState({ id: 1, account: 'admin@example.com', role: 'admin' });
      expect(isAdmin()).toBe(true);
      expect(isCustomer()).toBe(false);
    });
    test('以顧客登入後 isCustomer() 為 true', () => {
      setLoginState({ id: 2, account: 'user@example.com', role: 'customer' });
      expect(isCustomer()).toBe(true);
      expect(isAdmin()).toBe(false);
    });
  });
});

      expect(generateDefaultRoomTypes({ id: 10, price: 2000, capacity: 2 })[1].price).toBe(Math.round(2000 * 1.3));

  describe('getNextRoomId()', () => {
    test('無房源時回傳 1', () => {
      rooms = [];
      expect(getNextRoomId()).toBe(1);
    });

      rooms = [{ id: 1 }, { id: 3 }, { id: 2 }];
      expect(getNextRoomId()).toBe(4);
    });
  });

  describe('getRoomImages()', () => {
    test('應回傳長度為 3 的陣列', () => {
      expect(getRoomImages(1)).toHaveLength(3);

// ═══ 三、orders.js ═══
describe('orders.js — 訂單相關邏輯', () => {
  beforeEach(() => __resetState());

  describe('isDateRangeOverlap()', () => {
    test('完全重疊', () => {
      expect(isDateRangeOverlap('2025-01-01','2025-01-10','2025-01-01','2025-01-10')).toBe(true);
    });
    test('部分重疊（前段）', () => {
      expect(isDateRangeOverlap('2025-01-01','2025-01-05','2025-01-03','2025-01-08')).toBe(true);
    });
    test('部分重疊（後段）', () => {
      expect(isDateRangeOverlap('2025-01-05','2025-01-10','2025-01-01','2025-01-07')).toBe(true);
    });
    test('完全不重疊（A 在 B 之前）', () => {
      expect(isDateRangeOverlap('2025-01-01','2025-01-05','2025-01-06','2025-01-10')).toBe(false);
    });
    test('完全不重疊（A 在 B 之後）', () => {
      expect(isDateRangeOverlap('2025-01-10','2025-01-15','2025-01-01','2025-01-09')).toBe(false);
    });
    test('缺少任何日期回傳 false', () => {

/* ─────────────────────────────────────────────
   執行所有測試並渲染結果
   ───────────────────────────────────────────── */
(function runAll() {
  let totalPass = 0, totalFail = 0;

  function countResults(res) {
    res.ownResults.forEach(r => r.pass ? totalPass++ : totalFail++);
    res.children.forEach(c => countResults(c.results));
  }

  function buildTestItem(r) {
    const item = document.createElement('div');
    item.className = 'test-item';
    const icon = document.createElement('span');
    icon.className = 'test-icon ' + (r.pass ? 'pass' : 'fail');
    icon.textContent = r.pass ? '✓' : '✗';
    const body = document.createElement('div');
    body.className = 'test-body';
    const name = document.createElement('span');
    name.className = 'test-name';
    name.textContent = r.name;
    body.appendChild(name);
    if (!r.pass && r.err) {
      const errBox = document.createElement('pre');
      errBox.className = 'test-err';
      errBox.textContent = r.err;
      body.appendChild(errBox);
    }
    const ms = document.createElement('span');
    ms.className = 'test-ms';
    ms.textContent = r.ms + ' ms';
    item.appendChild(icon);
    item.appendChild(body);
    item.appendChild(ms);
    return item;
  }

  function buildSubSuite(child) {
    const block = document.createElement('div');
    block.className = 'subsuite';
    const label = document.createElement('div');
    label.className = 'subsuite-name';
    label.textContent = child.suite.name;
    block.appendChild(label);

    child.results.ownResults.forEach(r => block.appendChild(buildTestItem(r)));
    child.results.children.forEach(c => block.appendChild(buildSubSuite(c)));
    return block;
  }

  function buildSuiteCard(suite, res) {
    const ownPass = res.ownResults.filter(r => r.pass).length;
    const ownFail = res.ownResults.filter(r => !r.pass).length;
    let childPass = 0, childFail = 0;
    function sumChild(r) {
      r.ownResults.forEach(x => x.pass ? childPass++ : childFail++);
      r.children.forEach(c => sumChild(c.results));
    }
    res.children.forEach(c => sumChild(c.results));
    const totalP = ownPass + childPass, totalF = ownFail + childFail;

    const card = document.createElement('div');
    card.className = 'suite-card';

    const hdr = document.createElement('div');
    hdr.className = 'suite-header';
    hdr.innerHTML = `
      <span class="suite-icon">${totalF > 0 ? '📂' : '📁'}</span>
      <span class="suite-name">${suite.name}</span>
      <span class="suite-stat">
        <span class="p">${totalP} 通過</span>
        ${totalF > 0 ? ` / <span class="f">${totalF} 失敗</span>` : ''}
      </span>
      <span class="chevron">▾</span>
    `;
    hdr.addEventListener('click', () => card.classList.toggle('collapsed'));

    const body = document.createElement('div');
    body.className = 'suite-body';
    res.ownResults.forEach(r => body.appendChild(buildTestItem(r)));
    res.children.forEach(c => body.appendChild(buildSubSuite(c)));

    card.appendChild(hdr);
    card.appendChild(body);
    return card;
  }

  // 執行
  const main = document.getElementById('main');
  const allRes = __rootSuites.map(s => ({ suite: s, res: __runSuite(s) }));

  allRes.forEach(({ suite, res }) => {
    countResults(res);
    main.appendChild(buildSuiteCard(suite, res));
  });

  const total = totalPass + totalFail;
  document.getElementById('numTotal').textContent = total;
  document.getElementById('numPass').textContent  = totalPass;
  document.getElementById('numFail').textContent  = totalFail;

  const pct = total > 0 ? Math.round(totalPass / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent =
    `${totalPass} / ${total} 通過（${pct}%）`;

  const badge = document.getElementById('statusBadge');
  if (totalFail === 0) {
    badge.textContent = `✅ 全部通過`;
    badge.className = 'status-badge badge-pass';
    document.getElementById('progressFill').style.background = '#16a34a';
  } else {
    badge.textContent = `❌ ${totalFail} 項失敗`;
    badge.className = 'status-badge badge-fail';
    document.getElementById('progressFill').style.background =
      `linear-gradient(to right, #16a34a ${pct}%, #dc2626 ${pct}%)`;
  }
})();
</script>
